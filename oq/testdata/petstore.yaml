openapi: "3.1.0"
info:
  title: Petstore
  version: "1.0.0"
servers:
  - url: https://api.petstore.io/v1
    description: Production server
    variables:
      version:
        default: v1
  - url: https://staging.petstore.io
    description: Staging server
security:
  - bearerAuth: []
tags:
  - name: pets
    description: Everything about your pets
    summary: Pet operations
  - name: owners
    description: Pet owner management
paths:
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      x-speakeasy-name-override: ListAllPets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: format
          in: query
          deprecated: true
          schema:
            type: string
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
          links:
            GetPetById:
              operationId: showPetById
              description: Get a specific pet by ID from the list
    post:
      operationId: createPet
      tags: [pets]
      security:
        - bearerAuth: [pets:write]
      callbacks:
        onPetCreated:
          '{$request.body#/callbackUrl}':
            post:
              operationId: petCreatedCallback
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/Pet'
              responses:
                "200":
                  description: Callback acknowledged
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id:
              schema:
                type: string
              required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets/{petId}:
    get:
      operationId: showPetById
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events:
    get:
      operationId: streamEvents
      security: []
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
  /owners:
    get:
      operationId: listOwners
      tags: [owners]
      responses:
        "200":
          description: A list of owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Owner'
webhooks:
  petAdopted:
    post:
      operationId: petAdoptedWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        "200":
          description: Webhook acknowledged
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Pet:
      type: object
      x-speakeasy-entity: Pet
      properties:
        id:
          type: integer
        name:
          type: string
        tag:
          type: string
        status:
          type: string
          default: available
          enum:
            - available
            - pending
            - sold
        owner:
          $ref: '#/components/schemas/Owner'
      required:
        - id
        - name
    Owner:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required:
        - code
        - message
    Shape:
      oneOf:
        - $ref: '#/components/schemas/Circle'
        - $ref: '#/components/schemas/Square'
    Circle:
      type: object
      properties:
        radius:
          type: number
    Square:
      type: object
      properties:
        side:
          type: number
    Unused:
      type: object
      properties:
        data:
          type: string
    Metadata:
      type: object
      properties:
        name:
          type: string
      additionalProperties:
        type: string
      patternProperties:
        "^x-":
          type: string
